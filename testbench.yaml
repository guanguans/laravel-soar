laravel: '@testbench'

providers:
  - Workbench\App\Providers\WorkbenchServiceProvider
  - Guanguans\LaravelSoar\SoarServiceProvider
  - Clockwork\Support\Laravel\ClockworkServiceProvider
  - Fruitcake\LaravelDebugbar\ServiceProvider
  - LaraDumps\LaraDumps\LaraDumpsServiceProvider

dont-discover:
  - laravel/tinker
  - spatie/laravel-ray

env:
  APP_NAME: "Testbench"
  # DB_CONNECTION: sqlite
  # DB_DATABASE: ":memory:"
  SOAR_ENABLED: (true)
  # SOAR_SUDO_PASSWORD: "password"
  SOAR_TEST_DSN_DISABLE: (true)
  SOAR_ONLINE_DSN_DISABLE: (true)

migrations:
  - workbench/database/migrations/

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

workbench:
  start: '/'
  install: true
  discovers:
    config: true
    web: true
    api: true
    commands: true
    components: false
    factories: true
    views: true
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
    - public:link
  assets:
    - laravel-assets
  sync:
    - from: public
      to: workbench/public
      reverse: true
    - from: storage
      to: workbench/storage
      reverse: true
